# This template will generate a list of jobs that will run. The
# jobs created will correspond to the vmImages specified by the parameters.

parameters:
  vmImages: []
  maxParallel: 1

jobs:
  - job: build
    timeoutInMinutes: 300
    displayName: "Build: "

    # Build on each supported OS using the Go version declared in go.mod
    strategy:
      maxParallel: ${{ parameters.maxParallel }}
      matrix:
        ${{ each vmImage in parameters.vmImages }}:
          OS_${{ vmImage.ymlSafeName }}:
            vmImage: ${{ vmImage.value }}

    pool:
      name: pool-ubuntu-2404

    steps:
      - bash: |
          #!/usr/bin/env bash
          set -euo pipefail
          go_version="$(awk '/^go / { print $2; exit }' "$BUILD_SOURCESDIRECTORY/go.mod")"
          echo "Using Go version ${go_version} from go.mod"
          echo "##vso[task.setvariable variable=GO_VERSION]${go_version}"
        displayName: "Read Go version from go.mod"

      - task: GoTool@0
        displayName: "Install correct version of Go"
        inputs:
          version: $(GO_VERSION)
          GOPATH: "$(Pipeline.Workspace)/gopath"
          GOBIN: "$(GOPATH)/bin"

      - bash: |
          #!/usr/bin/env bash
          cd "$BUILD_SOURCESDIRECTORY"
          make tools
        displayName: "Install Dependencies"
      - task: TerraformInstaller@1
        displayName: "Install Terraform"
        inputs:
          terraformVersion: "1.14.9"
      - bash: |
          #!/usr/bin/env bash
          set -euo pipefail
          terraform_path="$(which terraform)"
          echo "Terraform installed at: ${terraform_path}"
          echo "##vso[task.setvariable variable=TF_ACC_TERRAFORM_PATH]${terraform_path}"
        displayName: "Configure Terraform CLI for acctest"
      - bash: |
          #!/usr/bin/env bash
          cd "$BUILD_SOURCESDIRECTORY"
          make depscheck
        displayName: "Verify Vendor Dependencies"
      - bash: |
          #!/usr/bin/env bash
          cd "$BUILD_SOURCESDIRECTORY"
          make fmtcheck
        displayName: "Run Format Check"
      - bash: |
          #!/usr/bin/env bash
          cd "$BUILD_SOURCESDIRECTORY"
          make lint
        displayName: "Run Lint Check"
      - ${{ if eq(parameters.unitTest, true) }}:
          - bash: |
              #!/usr/bin/env bash
              go version
              cd "$BUILD_SOURCESDIRECTORY"
              make test
            displayName: "Run Unit Tests"
      - ${{ if eq(parameters.accTest, true) }}:
          - bash: |
              #!/usr/bin/env bash
              cd "$BUILD_SOURCESDIRECTORY"
              make testacc
            displayName: "Run All Tests"
            env:
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_TEST_LOCATION: $(ARM_TEST_LOCATION)
              ARM_TEST_LOCATION_ALT: $(ARM_TEST_LOCATION_ALT)
              ARM_TEST_LOCATION_ALT2: $(ARM_TEST_LOCATION_ALT2)
              ARM_TEST_EXAMPLES: $(ARM_TEST_EXAMPLES)
              ARM_TEST_EXAMPLES_ALL: $(ARM_TEST_EXAMPLES_ALL)
              ARM_TEST_AVM: $(ARM_TEST_AVM)
              TF_ACC_TERRAFORM_PATH: $(TF_ACC_TERRAFORM_PATH)
              TESTARGS: $(TESTARGS)
              AZAPI_CORE_ACCTESTS_ONLY: "true"
