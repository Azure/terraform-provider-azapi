schedules:
  - cron: "0 0 * * *"
    displayName: "Nightly Build"
    branches:
      include:
        - 'main'

jobs:
  - template: ./ci.yml
    parameters:
      maxParallel: 1 # any more and we get throttled by AzDO!
      accTest: true
      vmImages:
        - value: 'ubuntu-24.04'
          ymlSafeName: ubuntu_24_04
